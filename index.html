<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Наш чат</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1e1f22;--sidebar:#2b2d31;--surface:#313338;--input-bg:#383a40;
  --border:rgba(255,255,255,0.06);--text:#dbdee1;--muted:#80848e;
  --accent:#5865f2;--accent-h:#4752c4;--green:#23a55a;--red:#f23f42;
  --white:#fff;--font:'Segoe UI',system-ui,sans-serif;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;height:100vh}
.sidebar{width:240px;min-width:240px;background:var(--sidebar);display:flex;flex-direction:column;border-right:1px solid var(--border)}
.srv-header{padding:16px;border-bottom:1px solid var(--border);font-size:15px;font-weight:600;color:var(--white)}
.srv-header small{display:block;font-size:11px;font-weight:400;color:var(--muted);margin-top:2px}
.ch-section{padding:16px 8px 4px;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.ch-btn{display:flex;align-items:center;gap:8px;width:calc(100% - 16px);margin:1px 8px;padding:7px 8px;border-radius:6px;border:none;background:transparent;color:var(--muted);font-size:14px;font-family:var(--font);cursor:pointer;text-align:left;transition:background .1s,color .1s}
.ch-btn:hover{background:rgba(255,255,255,.05);color:var(--text)}
.ch-btn.active{background:rgba(255,255,255,.1);color:var(--white)}
.ch-btn .ico{width:20px;text-align:center;font-size:15px;flex-shrink:0}
.online-section{margin-top:auto;border-top:1px solid var(--border);padding:8px;max-height:180px;overflow-y:auto}
.online-title{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;padding:4px 8px 6px}
.online-user{display:flex;align-items:center;gap:8px;padding:3px 8px;border-radius:6px;font-size:13px;color:var(--text)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;color:#fff}
.me-bar{padding:8px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px}
.me-bar .me-name{font-size:13px;font-weight:500;color:var(--white)}
.me-bar .me-status{font-size:11px;color:var(--green)}
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--surface)}
.chat-header{height:48px;padding:0 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.chat-header .h-icon{font-size:16px;color:var(--muted)}
.chat-header .h-title{font-size:15px;font-weight:600;color:var(--white)}
.chat-header .h-sub{font-size:13px;color:var(--muted);margin-left:2px}
.view{display:none;flex-direction:column;flex:1;min-height:0}
.view.active{display:flex}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:2px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.msg-group{display:flex;gap:12px;margin-top:12px}
.msg-group:first-child{margin-top:0}
.msg-body{flex:1;min-width:0}
.msg-meta{display:flex;align-items:baseline;gap:8px;margin-bottom:3px}
.msg-author{font-size:14px;font-weight:500;color:var(--white)}
.msg-time{font-size:11px;color:var(--muted)}
.msg-text{font-size:14px;line-height:1.5;color:var(--text);word-break:break-word}
.msg-cont{padding:1px 0 1px 48px;font-size:14px;line-height:1.5;color:var(--text);word-break:break-word}
.input-area{padding:0 16px 16px;flex-shrink:0}
.input-wrap{display:flex;align-items:center;gap:8px;background:var(--input-bg);border-radius:8px;padding:0 10px 0 16px}
.input-wrap input{flex:1;background:transparent;border:none;outline:none;font-size:14px;font-family:var(--font);color:var(--text);padding:11px 0}
.input-wrap input::placeholder{color:var(--muted)}
.send-btn{width:32px;height:32px;border-radius:6px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn:hover{background:var(--accent-h)}
.empty-msg{text-align:center;color:var(--muted);font-size:14px;padding:48px 0}
.voice-view{flex:1;display:flex;flex-direction:column;overflow:hidden}
.voice-top{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.vc-status{font-size:13px;color:var(--muted);margin-right:4px}
.vc-status.on{color:var(--green)}
.vc-btn{padding:6px 14px;border-radius:6px;border:none;font-size:13px;font-family:var(--font);cursor:pointer;font-weight:500}
.btn-join{background:var(--green);color:#fff}
.btn-leave{background:var(--red);color:#fff}
.btn-mute,.btn-screen{background:var(--input-bg);color:var(--text)}
.btn-mute.muted,.btn-screen.sharing{background:var(--accent);color:#fff}
.peers-area{flex:1;overflow:auto;display:grid;gap:8px;padding:12px;align-content:start}
.peer-tile{background:#111;border-radius:10px;overflow:hidden;position:relative;aspect-ratio:16/9}
.peer-tile video{width:100%;height:100%;object-fit:contain;background:#000;display:block}
.peer-av-c{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.peer-label{position:absolute;bottom:6px;left:8px;font-size:12px;font-weight:600;color:#fff;background:rgba(0,0,0,.6);padding:2px 8px;border-radius:4px}
.local-tile{border:1px solid var(--border)}
#login-overlay{position:absolute;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100}
.login-card{background:var(--sidebar);border-radius:12px;padding:32px;width:320px;display:flex;flex-direction:column;gap:16px}
.login-card h2{font-size:20px;font-weight:700;color:var(--white)}
.login-card p{font-size:13px;color:var(--muted);margin-top:-8px}
.login-card input{width:100%;padding:10px 14px;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;font-family:var(--font);outline:none}
.login-card input:focus{border-color:var(--accent)}
.login-card button{width:100%;padding:10px;background:var(--accent);border:none;border-radius:6px;color:#fff;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer}
.login-card button:hover{background:var(--accent-h)}
</style>
</head>
<body>

<div id="login-overlay">
  <div class="login-card">
    <h2>Войти в чат</h2>
    <p>Введи своё имя чтобы начать</p>
    <input id="name-input" type="text" placeholder="Твоё имя" maxlength="20" autofocus>
    <button onclick="login()">Войти</button>
  </div>
</div>

<div class="sidebar">
  <div class="srv-header">Наш чат<small id="online-label">загрузка...</small></div>
  <div class="ch-section">Каналы</div>
  <button class="ch-btn active" id="btn-text" onclick="switchView('text')">
    <span class="ico">#</span> общий
  </button>
  <button class="ch-btn" id="btn-voice" onclick="switchView('voice')">
    <span class="ico">🔊</span> голосовой
  </button>
  <div class="online-section">
    <div class="online-title">Онлайн</div>
    <div id="online-list"></div>
  </div>
  <div class="me-bar">
    <div class="av" id="me-av" style="width:32px;height:32px;font-size:13px;background:var(--accent)">?</div>
    <div style="flex:1;min-width:0">
      <div class="me-name" id="me-name">...</div>
      <div class="me-status">онлайн</div>
    </div>
  </div>
</div>

<div class="main">
  <div class="chat-header">
    <span class="h-icon" id="h-icon">#</span>
    <span class="h-title" id="h-title">общий</span>
    <span class="h-sub" id="h-sub">текстовый чат</span>
  </div>

  <div class="view active" id="view-text">
    <div class="messages" id="messages">
      <div class="empty-msg" id="empty-hint">Сообщений пока нет — напиши первым!</div>
    </div>
    <div class="input-area">
      <div class="input-wrap">
        <input id="msg-input" type="text" placeholder="Написать в #общий..." maxlength="500"
               onkeydown="if(event.key==='Enter')sendMsg()">
        <button class="send-btn" onclick="sendMsg()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M14.5 8L1.5 1.5l2 6.5-2 6.5L14.5 8z" fill="white"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="view" id="view-voice">
    <div class="voice-view">
      <div class="voice-top">
        <span class="vc-status" id="vc-status">Не подключён</span>
        <button class="vc-btn btn-join" id="btn-join" onclick="joinVoice()">Подключиться</button>
        <button class="vc-btn btn-leave" id="btn-leave" onclick="leaveVoice()" style="display:none">Выйти</button>
        <button class="vc-btn btn-mute" id="btn-mute" onclick="toggleMute()" style="display:none">🎙 Микрофон вкл</button>
        <button class="vc-btn btn-screen" id="btn-screen" onclick="toggleScreen()" style="display:none">🖥 Показать экран</button>
      </div>
      <div class="peers-area" id="peers-area">
        <div style="text-align:center;color:var(--muted);font-size:14px;padding:32px 0">
          Нажми «Подключиться» чтобы войти в голосовой канал
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey:            "AIzaSyDAHNd5ai_1pbuQVJHgmNd1Io5eC5vctRA",
  authDomain:        "nash-chat-81a9e.firebaseapp.com",
  databaseURL:       "https://nash-chat-81a9e-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "nash-chat-81a9e",
  storageBucket:     "nash-chat-81a9e.firebasestorage.app",
  messagingSenderId: "1083191209970",
  appId:             "1:1083191209970:web:4ac53b3ae90a7af405456b"
};

const STUN = {iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]};
const COLORS = ['#5865f2','#57f287','#fee75c','#eb459e','#ed4245','#00b0f4','#f47fff'];

let myName='', myColor='', myId='', db;
let lastAuthor='';
let localStream=null, screenStream=null;
let peers={};
let inVoice=false, muted=false, sharing=false;
let sigRef=null;

function initials(n){ return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?'; }
function colorFor(n){ let h=0; for(let c of n) h=(h*31+c.charCodeAt(0))&0xffff; return COLORS[h%COLORS.length]; }
function nowStr(){ return new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}); }
function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function login(){
  const val=document.getElementById('name-input').value.trim();
  if(!val) return;
  myName=val; myColor=colorFor(myName); myId=uid();

  document.getElementById('me-av').textContent=initials(myName);
  document.getElementById('me-av').style.background=myColor;
  document.getElementById('me-name').textContent=myName;
  document.getElementById('login-overlay').style.display='none';

  firebase.initializeApp(firebaseConfig);
  db=firebase.database();

  const presRef=db.ref('presence/'+myId);
  presRef.set({name:myName,color:myColor,id:myId});
  presRef.onDisconnect().remove();

  db.ref('presence').on('value',snap=>{
    const users=Object.values(snap.val()||{});
    document.getElementById('online-label').textContent=users.length+' онлайн';
    document.getElementById('online-list').innerHTML=users.map(u=>`
      <div class="online-user">
        <div class="av" style="width:24px;height:24px;font-size:10px;background:${u.color}">${initials(u.name)}</div>
        <span>${u.name}</span>
      </div>`).join('');
  });

  db.ref('messages').limitToLast(200).on('child_added',snap=>addMessage(snap.val()));

  sigRef=db.ref('voice/signals');
  const joinTs=Date.now();
  sigRef.on('child_added',snap=>{
    const sig=snap.val();
    if(!sig||sig.to!==myId||!inVoice) return;
    if(sig.ts && sig.ts < joinTs-5000) return;
    handleSignal(sig.from,sig);
  });
}

document.getElementById('name-input').addEventListener('keydown',e=>{ if(e.key==='Enter') login(); });

function sendMsg(){
  const inp=document.getElementById('msg-input');
  const text=inp.value.trim(); if(!text||!db) return;
  inp.value='';
  db.ref('messages').push({author:myName,color:myColor,text,time:nowStr()});
}

function addMessage(msg){
  const el=document.getElementById('messages');
  document.getElementById('empty-hint')?.remove();
  const same=msg.author===lastAuthor; lastAuthor=msg.author;
  if(!same){
    const g=document.createElement('div'); g.className='msg-group';
    g.innerHTML=`<div class="av" style="width:36px;height:36px;font-size:13px;background:${msg.color};margin-top:1px">${initials(msg.author)}</div>
      <div class="msg-body"><div class="msg-meta"><span class="msg-author">${msg.author}</span><span class="msg-time">${msg.time}</span></div>
      <div class="msg-text">${esc(msg.text)}</div></div>`;
    el.appendChild(g);
  } else {
    const c=document.createElement('div'); c.className='msg-cont'; c.textContent=msg.text; el.appendChild(c);
  }
  el.scrollTop=el.scrollHeight;
}

function switchView(v){
  ['text','voice'].forEach(x=>{
    document.getElementById('view-'+x).classList.toggle('active',x===v);
    document.getElementById('btn-'+x).classList.toggle('active',x===v);
  });
  const map={text:['#','общий','текстовый чат'],voice:['🔊','голосовой','голосовой канал']};
  const [ico,title,sub]=map[v];
  document.getElementById('h-icon').textContent=ico;
  document.getElementById('h-title').textContent=title;
  document.getElementById('h-sub').textContent=sub;
}

async function joinVoice(){
  try{ localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false}); }
  catch(e){ alert('Нет доступа к микрофону.\n\nОткрой файл через http:// или localhost, а не через file://\n\n'+e.message); return; }
  inVoice=true;
  setVoiceUI(true);
  renderPeers();

  const myPeerRef=db.ref('voice/peers/'+myId);
  myPeerRef.set({name:myName,color:myColor,id:myId});
  myPeerRef.onDisconnect().remove();

  db.ref('voice/peers').on('value',async snap=>{
    if(!inVoice) return;
    const ps=snap.val()||{};
    for(const [pid,info] of Object.entries(ps)){
      if(pid===myId||peers[pid]) continue;
      await createPeer(pid,info,true);
    }
    for(const pid of Object.keys(peers)){
      if(!ps[pid]) removePeer(pid);
    }
    renderPeers();
  });
}

async function createPeer(peerId,info,initiator){
  const pc=new RTCPeerConnection(STUN);
  peers[peerId]={pc,name:info.name||'?',color:info.color||'#5865f2'};

  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

  pc.ontrack=e=>{
    if(!peers[peerId]) return;
    const stream=e.streams[0];
    if(e.track.kind==='audio'){
      let au=peers[peerId].audioEl;
      if(!au){
        au=document.createElement('audio');
        au.autoplay=true;
        au.setAttribute('playsinline','');
        document.body.appendChild(au);
        peers[peerId].audioEl=au;
      }
      au.srcObject=stream;
      au.play().catch(()=>{});
    }
    if(e.track.kind==='video'){
      peers[peerId].videoStream=stream; renderPeers();
    }
  };

  pc.onicecandidate=e=>{
    if(e.candidate) sendSig(peerId,{type:'candidate',candidate:e.candidate});
  };

  pc.onconnectionstatechange=()=>{
    if(['disconnected','failed','closed'].includes(pc.connectionState)) removePeer(peerId);
  };

  if(initiator){
    const offer=await pc.createOffer();
    await pc.setLocalDescription(offer);
    sendSig(peerId,{type:'offer',sdp:offer});
  }
}

async function handleSignal(fromId,sig){
  if(sig.type==='offer'){
    if(!peers[fromId]) await createPeer(fromId,{name:sig.name,color:sig.color},false);
    const pc=peers[fromId].pc;
    await pc.setRemoteDescription(sig.sdp);
    const answer=await pc.createAnswer();
    await pc.setLocalDescription(answer);
    sendSig(fromId,{type:'answer',sdp:answer,name:myName,color:myColor});
  } else if(sig.type==='answer'){
    if(peers[fromId]) await peers[fromId].pc.setRemoteDescription(sig.sdp).catch(()=>{});
  } else if(sig.type==='candidate'){
    if(peers[fromId]) await peers[fromId].pc.addIceCandidate(sig.candidate).catch(()=>{});
  } else if(sig.type==='screen-on'){
    if(peers[fromId]){ peers[fromId].hasScreen=true; renderPeers(); }
  } else if(sig.type==='screen-off'){
    if(peers[fromId]){ peers[fromId].hasScreen=false; peers[fromId].videoStream=null; renderPeers(); }
  }
}

function sendSig(toId,data){
  sigRef.push({...data,from:myId,to:toId,name:myName,color:myColor,ts:Date.now()});
}

function removePeer(pid){
  if(!peers[pid]) return;
  try{ peers[pid].pc.close(); }catch(_){}
  if(peers[pid].audioEl){
    peers[pid].audioEl.srcObject=null;
    peers[pid].audioEl.remove();
  }
  delete peers[pid];
  renderPeers();
}

function leaveVoice(){
  inVoice=false;
  db.ref('voice/peers').off();
  db.ref('voice/peers/'+myId).remove();
  Object.keys(peers).forEach(removePeer);
  localStream?.getTracks().forEach(t=>t.stop()); localStream=null;
  screenStream?.getTracks().forEach(t=>t.stop()); screenStream=null;
  sharing=false; muted=false;
  setVoiceUI(false); renderPeers();
}

function toggleMute(){
  if(!localStream) return;
  muted=!muted;
  localStream.getAudioTracks().forEach(t=>t.enabled=!muted);
  const btn=document.getElementById('btn-mute');
  btn.textContent=muted?'🔇 Микрофон выкл':'🎙 Микрофон вкл';
  btn.classList.toggle('muted',muted);
  renderPeers();
}

async function toggleScreen(){
  if(sharing){ stopScreen(); return; }
  try{
    screenStream=await navigator.mediaDevices.getDisplayMedia({video:true,audio:true});
  } catch(e){ return; }
  sharing=true;
  const track=screenStream.getVideoTracks()[0];
  track.onended=stopScreen;

  for(const [pid,p] of Object.entries(peers)){
    try{
      p.screenSender=p.pc.addTrack(track,screenStream);
      sendSig(pid,{type:'screen-on'});
    }catch(_){}
  }

  document.getElementById('btn-screen').textContent='🔴 Стоп трансляция';
  document.getElementById('btn-screen').classList.add('sharing');
  renderPeers();
}

function stopScreen(){
  if(!sharing) return;
  sharing=false;
  screenStream?.getTracks().forEach(t=>t.stop()); screenStream=null;
  for(const [pid,p] of Object.entries(peers)){
    if(p.screenSender) try{ p.pc.removeTrack(p.screenSender); }catch(_){}
    delete p.screenSender;
    sendSig(pid,{type:'screen-off'});
  }
  document.getElementById('btn-screen').textContent='🖥 Показать экран';
  document.getElementById('btn-screen').classList.remove('sharing');
  renderPeers();
}

function setVoiceUI(on){
  document.getElementById('btn-join').style.display=on?'none':'';
  document.getElementById('btn-leave').style.display=on?'':'none';
  document.getElementById('btn-mute').style.display=on?'':'none';
  document.getElementById('btn-screen').style.display=on?'':'none';
  const s=document.getElementById('vc-status');
  s.textContent=on?'В голосовом канале':'Не подключён';
  s.className='vc-status'+(on?' on':'');
}

function renderPeers(){
  const area=document.getElementById('peers-area');
  if(!inVoice){
    area.innerHTML='<div style="text-align:center;color:var(--muted);font-size:14px;padding:32px 0">Нажми «Подключиться» чтобы войти в голосовой канал</div>';
    return;
  }

  const tiles=[{id:'me',name:myName,color:myColor,videoStream:sharing?screenStream:null,isLocal:true}];
  for(const [pid,p] of Object.entries(peers)){
    tiles.push({id:pid,name:p.name,color:p.color,videoStream:p.videoStream||null});
  }

  const cols=tiles.length<=1?1:tiles.length<=4?2:3;
  area.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  area.innerHTML='';

  tiles.forEach(t=>{
    const tile=document.createElement('div');
    tile.className='peer-tile'+(t.isLocal?' local-tile':'');

    if(t.videoStream){
      const vid=document.createElement('video');
      vid.autoplay=true; vid.muted=t.isLocal; vid.playsInline=true;
      vid.srcObject=t.videoStream;
      vid.style.cssText='width:100%;height:100%;object-fit:contain;background:#000;display:block';
      tile.appendChild(vid);
    } else {
      const c=document.createElement('div'); c.className='peer-av-c';
      c.innerHTML=`<div class="av" style="width:56px;height:56px;font-size:20px;background:${t.color}">${initials(t.name)}</div>`;
      tile.appendChild(c);
    }

    const lbl=document.createElement('div'); lbl.className='peer-label';
    lbl.textContent=(t.isLocal?'Вы: ':'')+t.name+(t.isLocal&&muted?' [выкл]':'');
    tile.appendChild(lbl);
    area.appendChild(tile);
  });
}
</script>
</body>
</html>
